version: "2"

linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - errcheck
    - errorlint
    - forbidigo
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - thelper
    - unconvert
    - unused
    - usestdlibvars
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: github.com/pkg/errors
              desc: Use standard library errors/fmt wrapping instead.
            - pkg: io/ioutil
              desc: Use os or io packages instead of io/ioutil.
        ui-data-boundary:
          list-mode: lax
          files:
            - "!$test"
            - "**/internal/ui/**"
          deny:
            - pkg: github.com/andyrewlee/amux/internal/data
              desc: UI packages must not import internal/data directly. Use internal/messages or abstracted types instead.
        messages-circularity:
          list-mode: lax
          files:
            - "!$test"
            - "**/internal/data/**"
            - "**/internal/git/**"
            - "**/internal/tickets/**"
          deny:
            - pkg: github.com/andyrewlee/amux/internal/messages
              desc: This package must not import internal/messages (would create circular dependency via internal/messages).
    errcheck:
      check-type-assertions: true
    errorlint:
      asserts: false
      comparison: false
      errorf: true
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: true
    forbidigo:
      analyze-types: true
      exclude-godoc-examples: true
      forbid:
        - pattern: ^print(ln)?$
          msg: Avoid direct stdout/stderr prints in production code.
        - pattern: ^fmt\.Print.*$
          msg: Use internal/logging for internal packages; stdout/stderr output is reserved for CLI entrypoints.
        - pattern: ^log\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)$
          msg: Use internal/logging and explicit error returns instead of stdlib log side effects.
    thelper:
      test:
        begin: false
      benchmark:
        begin: false
      tb:
        begin: false
      fuzz:
        begin: false
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
        path: ^cmd/
      - linters:
          - forbidigo
        path: _test\.go
